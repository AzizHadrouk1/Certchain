services:
  postgres:
    image: postgres:16-alpine
    container_name: certchain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: certchain
      POSTGRES_PASSWORD: certchain
      POSTGRES_DB: certchain
    ports:
      - "5432:5432"
    volumes:
      - certchain_pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  adminer:
    image: adminer:4
    container_name: certchain-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  certchain_pgdata:
